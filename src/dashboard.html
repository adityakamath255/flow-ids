<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>flow-ids</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Liberation Mono', monospace; background: #1e1e2e; color: #cdd6f4; }

  header {
    padding: 16px 24px;
    background: #181825;
    border-bottom: 1px solid #313244;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 18px; font-weight: 600; color: #cdd6f4; }
  #status {
    font-size: 13px;
    padding: 4px 12px;
    border-radius: 12px;
  }
  #status.connected { background: #1e3a2e; color: #a6e3a1; }
  #status.disconnected { background: #3a1e2e; color: #f38ba8; }

  .controls {
    padding: 12px 24px;
    background: #181825;
    border-bottom: 1px solid #313244;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .controls label { font-size: 13px; color: #a6adc8; }
  .controls select {
    background: #313244;
    color: #cdd6f4;
    border: 1px solid #45475a;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 13px;
    font-family: 'Liberation Mono', monospace;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    padding: 16px 24px 0;
  }
  .stat-card {
    background: #181825;
    border: 1px solid #313244;
    border-radius: 8px;
    padding: 16px;
  }
  .stat-card .stat-label {
    font-size: 12px;
    color: #a6adc8;
    margin-bottom: 8px;
  }
  .stat-card .stat-value {
    font-size: 28px;
    font-weight: 700;
    color: #cdd6f4;
    font-variant-numeric: tabular-nums;
  }
  .stat-card .stat-sub {
    font-size: 12px;
    color: #a6adc8;
    margin-top: 4px;
  }
  .stat-card.threats .stat-value { color: #f38ba8; }

  .grid {
    display: grid;
    grid-template-columns: 1fr 3fr;
    gap: 16px;
    padding: 16px 24px;
  }
  .card {
    background: #181825;
    border: 1px solid #313244;
    border-radius: 8px;
    padding: 16px;
  }
  .card h2 {
    font-size: 14px;
    font-weight: 500;
    color: #a6adc8;
    margin-bottom: 12px;
  }
  .card canvas { width: 100% !important; }
  .card:has(#dist-chart) {
    display: grid;
    grid-template-rows: auto 1fr;
  }
  .card:has(#dist-chart) canvas {
    align-self: center;
  }

  .table-container {
    margin: 0 24px 24px;
    background: #181825;
    border: 1px solid #313244;
    border-radius: 8px;
    overflow: hidden;
  }
  .table-container h2 {
    font-size: 14px;
    font-weight: 500;
    color: #a6adc8;
    padding: 16px 16px 12px;
  }
  .table-wrap {
    max-height: 400px;
    overflow-y: auto;
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    position: sticky;
    top: 0;
    background: #313244;
    padding: 8px 12px;
    text-align: left;
    font-weight: 500;
    color: #bac2de;
    border-bottom: 1px solid #45475a;
  }
  tbody td {
    padding: 6px 12px;
    border-bottom: 1px solid #313244;
    white-space: nowrap;
  }
  tbody tr:hover { background: #313244; }
  .label-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 500;
  }

  .table-wrap::-webkit-scrollbar { width: 6px; }
  .table-wrap::-webkit-scrollbar-track { background: #181825; }
  .table-wrap::-webkit-scrollbar-thumb { background: #45475a; border-radius: 3px; }

  @media (max-width: 1100px) {
    .stats { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>flow-ids</h1>
  <span id="status" class="disconnected">Connecting...</span>
</header>

<div class="controls">
  <label for="source-select">Source:</label>
  <select id="source-select">
    <option value="live">Live</option>
  </select>
</div>

<div class="stats">
  <div class="stat-card">
    <div class="stat-label">Total Flows</div>
    <div class="stat-value" id="stat-total">0</div>
  </div>
  <div class="stat-card threats">
    <div class="stat-label">Threats Detected</div>
    <div class="stat-value" id="stat-threats">0</div>
    <div class="stat-sub" id="stat-threat-rate">0% of traffic</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Total Bytes</div>
    <div class="stat-value" id="stat-bytes">0 B</div>
  </div>
</div>

<div class="grid">
  <div class="card">
    <h2>Classification Distribution</h2>
    <canvas id="dist-chart"></canvas>
  </div>
  <div class="card">
    <h2>Timeline</h2>
    <canvas id="timeline-chart"></canvas>
  </div>
</div>

<div class="table-container">
  <h2>Flows <span id="flow-count" style="color:#6c7086"></span></h2>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Time</th>
          <th>Source</th>
          <th>Destination</th>
          <th>Protocol</th>
          <th>Label</th>
          <th>Confidence</th>
        </tr>
      </thead>
      <tbody id="flow-tbody"></tbody>
    </table>
  </div>
</div>

<script>
const LABEL_COLORS = {
    "BENIGN":      { bg: "#1e3a2e", fg: "#a6e3a1" },
    "DDOS":        { bg: "#3a1e2e", fg: "#f38ba8" },
    "DOS":         { bg: "#3a1e2e", fg: "#eba0ac" },
    "BRUTE-FORCE": { bg: "#3a2e1e", fg: "#fab387" },
    "RECON":       { bg: "#2e1e3a", fg: "#cba6f7" },
};
const DEFAULT_COLOR = { bg: "#45475a", fg: "#bac2de" };
const MAX_TABLE_ROWS = 200;
const TIMELINE_BUCKETS = 30;
const TIMELINE_BUCKET_SEC = 5;
const BYTE_UNITS = ["B", "KB", "MB", "GB"];

let totalFlows = 0;
let totalBytes = 0;
let threatCount = 0;
let classCounts = {};
let timelineBuckets = [];
let sseSource = null;
let timelineInterval = null;

const tbody = document.getElementById("flow-tbody");
const sourceSelect = document.getElementById("source-select");
const statusEl = document.getElementById("status");

function getLabelColor(label) {
    return LABEL_COLORS[label] || DEFAULT_COLOR;
}

function formatBytes(bytes) {
    let i = 0;
    let value = bytes;
    while (value >= 1024 && i < BYTE_UNITS.length - 1) {
        value /= 1024;
        i++;
    }
    const formatted = i === 0 ? value : value.toFixed(1);
    return formatted + " " + BYTE_UNITS[i];
}

function formatTime(ts) {
    if (!ts) return "--:--:--";
    if (ts.includes("T")) return new Date(ts).toLocaleTimeString();
    return ts.split(" ")[1] || ts;
}

function bucketKey(ts) {
    const epoch = new Date(ts.replace(" ", "T")).getTime() / 1000;
    return Math.floor(epoch / TIMELINE_BUCKET_SEC) * TIMELINE_BUCKET_SEC;
}

// --- Charts ---

const distChart = new Chart(document.getElementById("dist-chart"), {
    type: "doughnut",
    data: {
        labels: [],
        datasets: [{ data: [], backgroundColor: [] }],
    },
    options: {
        responsive: true,
        animation: false,
        plugins: {
            legend: {
                position: "bottom",
                labels: { color: "#a6adc8", boxWidth: 12 },
            },
        },
    },
});

const timelineChart = new Chart(document.getElementById("timeline-chart"), {
    type: "line",
    data: { labels: [], datasets: [] },
    options: {
        responsive: true,
        animation: false,
        interaction: { intersect: false, mode: "index" },
        plugins: {
            legend: { labels: { color: "#a6adc8", boxWidth: 12 } },
        },
        scales: {
            x: {
                grid: { color: "#313244" },
                ticks: { color: "#a6adc8", maxTicksLimit: 8 },
            },
            y: {
                grid: { color: "#313244" },
                ticks: { color: "#a6adc8" },
                beginAtZero: true,
            },
        },
    },
});

// --- Stats ---

function updateStats() {
    document.getElementById("stat-total").textContent =
        totalFlows.toLocaleString();
    document.getElementById("stat-threats").textContent =
        threatCount.toLocaleString();
    document.getElementById("stat-bytes").textContent =
        formatBytes(totalBytes);

    const rate = totalFlows > 0
        ? ((threatCount / totalFlows) * 100).toFixed(1)
        : "0";
    document.getElementById("stat-threat-rate").textContent =
        rate + "% of traffic";
    document.getElementById("flow-count").textContent =
        totalFlows + " flows";
}

function updateDistChart() {
    const sorted = Object.entries(classCounts).sort((a, b) => b[1] - a[1]);
    distChart.data.labels = sorted.map(e => e[0]);
    distChart.data.datasets[0].data = sorted.map(e => e[1]);
    distChart.data.datasets[0].backgroundColor =
        sorted.map(e => getLabelColor(e[0]).fg);
    distChart.update();
}

function updateTimelineChart() {
    const allLabels = Object.keys(classCounts);
    const labels = timelineBuckets.map(b => {
        const d = new Date(b.time * 1000);
        const h = String(d.getHours()).padStart(2, "0");
        const m = String(d.getMinutes()).padStart(2, "0");
        const s = String(d.getSeconds()).padStart(2, "0");
        return h + ":" + m + ":" + s;
    });
    timelineChart.data.labels = labels;
    timelineChart.data.datasets = allLabels.map(label => ({
        label,
        data: timelineBuckets.map(b => b.counts[label] || 0),
        borderColor: getLabelColor(label).fg,
        backgroundColor: "transparent",
        tension: 0.3,
        pointRadius: 0,
    }));
    timelineChart.update();
}

// --- Core ---

function addFlow(flow) {
    classCounts[flow.class] = (classCounts[flow.class] || 0) + 1;
    totalFlows++;
    totalBytes += flow.bytes;
    if (flow.class !== "BENIGN") threatCount++;

    if (flow.timestamp) {
        const key = bucketKey(flow.timestamp);
        let bucket = timelineBuckets.find(b => b.time === key);
        if (!bucket) {
            const last = timelineBuckets.length > 0
                ? timelineBuckets[timelineBuckets.length - 1].time
                : key;
            for (let t = last + TIMELINE_BUCKET_SEC; t < key; t += TIMELINE_BUCKET_SEC) {
                timelineBuckets.push({ time: t, counts: {} });
            }
            bucket = { time: key, counts: {} };
            timelineBuckets.push(bucket);
            while (timelineBuckets.length > TIMELINE_BUCKETS) {
                timelineBuckets.shift();
            }
        }
        bucket.counts[flow.class] = (bucket.counts[flow.class] || 0) + 1;
    }

    const color = getLabelColor(flow.class);
    const tr = document.createElement("tr");

    const timeTd = document.createElement("td");
    timeTd.textContent = formatTime(flow.timestamp);
    tr.appendChild(timeTd);

    const srcTd = document.createElement("td");
    srcTd.textContent = flow.src;
    tr.appendChild(srcTd);

    const dstTd = document.createElement("td");
    dstTd.textContent = flow.dst;
    tr.appendChild(dstTd);

    const protoTd = document.createElement("td");
    protoTd.textContent = flow.protocol;
    tr.appendChild(protoTd);

    const labelTd = document.createElement("td");
    const badge = document.createElement("span");
    badge.className = "label-badge";
    badge.style.background = color.bg;
    badge.style.color = color.fg;
    badge.textContent = flow.class;
    labelTd.appendChild(badge);
    tr.appendChild(labelTd);

    const confTd = document.createElement("td");
    confTd.textContent = (flow.confidence * 100).toFixed(1) + "%";
    tr.appendChild(confTd);

    tbody.insertBefore(tr, tbody.firstChild);

    while (tbody.children.length > MAX_TABLE_ROWS) {
        tbody.removeChild(tbody.lastChild);
    }
}

// --- Mode switching ---

function clearAll() {
    totalFlows = 0;
    totalBytes = 0;
    threatCount = 0;
    classCounts = {};
    timelineBuckets = [];
    tbody.innerHTML = "";
    distChart.data.labels = [];
    distChart.data.datasets[0].data = [];
    distChart.update();
    timelineChart.data.labels = [];
    timelineChart.data.datasets = [];
    timelineChart.update();
    updateStats();
}

function stopLive() {
    if (sseSource) {
        sseSource.close();
        sseSource = null;
    }
    if (timelineInterval) {
        clearInterval(timelineInterval);
        timelineInterval = null;
    }
}

function refreshCharts() {
    updateDistChart();
    updateTimelineChart();
    updateStats();
}

function startLive() {
    stopLive();
    clearAll();

    fetch("/api/snapshot")
        .then(res => res.json())
        .then(data => {
            data.flows.forEach(flow => addFlow(flow));
            refreshCharts();

            sseSource = new EventSource("/api/flows");
            sseSource.onopen = () => {
                statusEl.textContent = "Live";
                statusEl.className = "connected";
            };
            sseSource.onmessage = (event) => {
                const flow = JSON.parse(event.data);
                addFlow(flow);
                refreshCharts();
            };
            sseSource.onerror = () => {
                statusEl.textContent = "Disconnected";
                statusEl.className = "disconnected";
            };

            timelineInterval = setInterval(
                updateTimelineChart,
                TIMELINE_BUCKET_SEC * 1000
            );
        });
}

function loadLog(filename) {
    stopLive();
    clearAll();
    statusEl.textContent = "Log";
    statusEl.className = "disconnected";

    fetch("/api/logs/" + filename)
        .then(res => res.json())
        .then(flows => {
            flows.forEach(flow => addFlow(flow));
            refreshCharts();
        });
}

// --- Init ---

fetch("/api/logs")
    .then(res => res.json())
    .then(files => {
        for (const file of files) {
            const option = document.createElement("option");
            option.value = file;
            option.textContent = file;
            sourceSelect.appendChild(option);
        }
    });

sourceSelect.addEventListener("change", () => {
    const value = sourceSelect.value;
    if (value === "live") {
        startLive();
    } else {
        loadLog(value);
    }
});

startLive();
</script>
</body>
</html>
